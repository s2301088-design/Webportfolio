<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Angelo V. Batayen - Web Developer Portfolio</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            background: radial-gradient(circle at 80% 20%, #eef7ff 0%, #d2e9fa 40%, #badbf7 100%);
            background-attachment: fixed;
            color: #000000;
            padding: 140px 20px 60px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }


        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background: rgba(210, 233, 250, 0.95);
            border-bottom: 2px solid #000000;
            display: flex;
            justify-content: center;
            gap: 45px;
            padding: 20px 0;
            z-index: 1000;
        }

        .navbar a {
            text-decoration: none;
            color: #000000;
            font-size: 1.15rem;
            font-weight: 500;
            transition: all 0.2s ease;
            padding: 4px 12px;
            border-radius: 4px;
        }

        .navbar a.active-tab, 
        .navbar a:hover {
            color: #0a3d40;
            font-weight: bold;
            background-color: rgba(255, 255, 255, 0.5);
            outline: 1px solid #000000;
        }


        .portfolio-container {
            width: 100%;
            max-width: 1200px;
            position: relative;
        }

        .horizontal-divider {
            width: 100%;
            height: 2px;
            background-color: #000000;
            margin: 25px 0;
        }

        .www-badge {
            position: absolute;
            top: -20px;
            right: 0;
            width: 130px;
            height: auto;
            z-index: 10;
        }


        .hero-title-area {
            padding-left: 5%;
            margin-top: 15px;
            margin-bottom: 15px;
        }

        .hero-title-area h2 {
            font-size: 2.8rem;
            color: #0a3d40;
            font-weight: normal;
            font-family: 'Trebuchet MS', sans-serif;
            line-height: 1.1;
        }

        .hero-title-area h1 {
            font-size: 4rem;
            color: #0a3d40;
            font-weight: bold;
            font-family: 'Trebuchet MS', sans-serif;
            letter-spacing: 0.5px;
            line-height: 1.1;
        }


        .home-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
        }

        .presentation-box {
            background-color: #ffffff;
            border: 2px solid #000000;
            box-shadow: 6px 6px 0px rgba(0, 0, 0, 0.3);
            padding: 25px;
            width: 100%;
        }

        .contact-grid {
            display: grid;
            grid-template-columns: 1fr;
            row-gap: 20px;
        }

        @media (min-width: 600px) {
            .contact-grid {
                grid-template-columns: 1fr 1fr;
                column-gap: 20px;
            }
        }

        .contact-entry {
            display: flex;
            align-items: center;
            font-size: 1.1rem;
            font-weight: bold;
            text-decoration: underline;
            white-space: nowrap;
        }

        .contact-icon {
            width: 32px;
            height: 32px;
            margin-right: 12px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .contact-icon svg {
            width: 100%;
            height: 100%;
        }

        .quote-wrapper {
            display: flex;
            align-items: center;
            gap: 15px;
            height: 100%;
        }

        .mini-avatar-circle {
            width: 55px;
            height: 55px;
            background-color: #4285f4;
            border-radius: 50%;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }


        @media (max-width: 850px) {
            .navbar { 
                gap: 15px; 
                padding: 15px 5px; 
            }
            .navbar a { 
                font-size: 1rem; 
                padding: 4px 8px; 
            }
            .home-grid { 
                grid-template-columns: 1fr; 
                gap: 40px; 
            }
        }
    </style>
</head>
